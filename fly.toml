# Fly.io (https://fly.io/docs/reference/configuration/)
#
# Typical flow:
#   fly launch          # creates app / aligns fly.toml — set app name
#   fly deploy          # first deploy may create volume if initial_size is set
#
# Persistence: profiles, uploads, outputs, jobs, usage_stats live under
# fillmypdf/storage → mount must match Dockerfile layout (/app/fillmypdf/storage).

app = "fillmypdf-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Long-running multipart PDF / batch uploads via Fly Proxy
  [http_service.http_options]
    idle_timeout = 600

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "fillmypdf_storage"
  destination = "/app/fillmypdf/storage"
  initial_size = "3gb"
