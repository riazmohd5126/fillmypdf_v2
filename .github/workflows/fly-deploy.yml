# Deploy API to Fly.io on push to main.
# Repo secret: FLY_API_TOKEN (fly tokens create Deploy token at https://fly.io/user/personal_access_tokens)

name: Fly deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
