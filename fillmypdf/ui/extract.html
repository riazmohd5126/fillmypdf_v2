<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract Fields — FillMyPDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui,-apple-system,sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
    <a href="/ui/index.html" class="text-gray-400 hover:text-indigo-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="font-semibold text-gray-800">Extract Fields</span>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <p class="text-sm text-gray-500 mb-8">Upload a filled PDF form and extract all AcroForm field values to JSON or CSV — no AI needed.</p>

    <form onsubmit="runExtract(event)" class="space-y-6">

      <!-- PDF drop zone -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Filled PDF <span class="text-red-500">*</span></label>
        <div id="drop-zone"
             class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-400 transition"
             onclick="document.getElementById('pdf-input').click()"
             ondragover="event.preventDefault(); this.classList.add('border-indigo-400','bg-indigo-50')"
             ondragleave="this.classList.remove('border-indigo-400','bg-indigo-50')"
             ondrop="handleDrop(event)">
          <svg class="w-10 h-10 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          <p id="file-label" class="text-sm text-gray-400">Drop a filled PDF here or click to browse</p>
          <input id="pdf-input" type="file" accept=".pdf" class="hidden" onchange="onFileChosen(this)">
        </div>
      </div>

      <!-- Options row -->
      <div class="flex flex-wrap gap-6 items-center">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Output format</label>
          <div class="flex gap-2">
            <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
              <input type="radio" name="fmt" value="json" checked class="text-indigo-600"> JSON
            </label>
            <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
              <input type="radio" name="fmt" value="csv" class="text-indigo-600"> CSV download
            </label>
          </div>
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input id="include-labels" type="checkbox" checked class="text-indigo-600 rounded">
          Include inferred field labels
        </label>
      </div>

      <button type="submit" id="submit-btn"
        class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Extract Fields
      </button>
    </form>

    <!-- Result -->
    <div id="result" class="mt-8 hidden"></div>
  </main>

<script>
  function getKey() { return localStorage.getItem('fmp_api_key') || ''; }

  function onFileChosen(input) {
    const f = input.files[0];
    if (f) document.getElementById('file-label').textContent = f.name;
  }

  function handleDrop(e) {
    e.preventDefault();
    const zone = document.getElementById('drop-zone');
    zone.classList.remove('border-indigo-400','bg-indigo-50');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const dt = new DataTransfer(); dt.items.add(f);
    const input = document.getElementById('pdf-input');
    input.files = dt.files;
    document.getElementById('file-label').textContent = f.name;
  }

  async function runExtract(e) {
    e.preventDefault();
    const key = getKey();
    if (!key) { showErr('No API key set. <a href="/ui/index.html" class="underline">Set it on the dashboard.</a>'); return; }

    const file = document.getElementById('pdf-input').files[0];
    if (!file) { showErr('Please select a PDF.'); return; }

    const fmt = document.querySelector('input[name="fmt"]:checked').value;
    const includeLabels = document.getElementById('include-labels').checked;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Extracting…';

    try {
      const fd = new FormData();
      fd.append('file', file);
      const params = new URLSearchParams({ format: fmt, include_labels: includeLabels });
      const r = await fetch(`/api/v1/extract?${params}`, {
        method: 'POST', headers: { 'X-API-Key': key }, body: fd
      });

      if (fmt === 'csv') {
        if (!r.ok) { const d = await r.json().catch(() => ({})); showErr(d.detail || `HTTP ${r.status}`); return; }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = file.name.replace('.pdf', '_fields.csv'); a.click();
        URL.revokeObjectURL(url);
        showSuccess(`CSV downloaded — ${file.name.replace('.pdf','_fields.csv')}`);
        return;
      }

      if (!r.ok) { const d = await r.json().catch(() => ({})); showErr(d.detail || `HTTP ${r.status}`); return; }
      const data = await r.json();
      renderJson(data, file.name);
    } catch(err) {
      showErr(err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Extract Fields';
    }
  }

  function renderJson(data, filename) {
    const result = document.getElementById('result');
    result.classList.remove('hidden');
    const fields = data.fields || [];
    const filled = fields.filter(f => f.value != null && f.value !== '');
    const empty  = fields.filter(f => f.value == null || f.value === '');

    result.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="font-semibold text-gray-900 text-sm">${esc(data.filename || filename)}</p>
            <p class="text-xs text-gray-400 mt-0.5">${fields.length} field${fields.length!==1?'s':''} · ${filled.length} filled · ${empty.length} empty</p>
          </div>
          <button onclick="copyJson()" class="text-xs text-indigo-600 border border-indigo-200 rounded-lg px-3 py-1 hover:bg-indigo-50">Copy JSON</button>
        </div>

        ${filled.length ? `
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Filled fields</p>
        <div class="space-y-1.5 mb-4">
          ${filled.map(f => `
            <div class="flex items-start gap-3 bg-green-50 rounded-lg px-3 py-2 text-xs">
              <span class="font-mono text-gray-700 flex-shrink-0 w-40 truncate" title="${esc(f.name)}">${esc(f.name)}</span>
              ${f.label ? `<span class="text-indigo-500 flex-shrink-0 w-28 truncate" title="${esc(f.label)}">${esc(f.label)}</span>` : '<span class="flex-shrink-0 w-28"></span>'}
              <span class="text-gray-800 font-medium break-all">${esc(String(f.value))}</span>
            </div>`).join('')}
        </div>` : ''}

        ${empty.length ? `
        <details class="mt-2">
          <summary class="text-xs font-semibold text-gray-400 uppercase tracking-wide cursor-pointer select-none">${empty.length} empty field${empty.length!==1?'s':''}</summary>
          <div class="space-y-1 mt-2">
            ${empty.map(f => `
              <div class="flex items-center gap-3 bg-gray-50 rounded-lg px-3 py-1.5 text-xs">
                <span class="font-mono text-gray-500 flex-1 truncate">${esc(f.name)}</span>
                <span class="text-gray-300">${esc(f.field_type||'')}</span>
              </div>`).join('')}
          </div>
        </details>` : ''}

        <div class="mt-4">
          <p class="text-xs font-medium text-gray-500 mb-1">Raw JSON</p>
          <pre id="raw-json" class="bg-gray-50 rounded-lg p-3 text-xs font-mono overflow-x-auto max-h-64 overflow-y-auto text-gray-700">${esc(JSON.stringify(data, null, 2))}</pre>
        </div>
      </div>`;

    window._extractedJson = data;
  }

  function copyJson() {
    navigator.clipboard.writeText(JSON.stringify(window._extractedJson, null, 2))
      .then(() => alert('Copied to clipboard!'));
  }

  function showErr(msg) {
    const result = document.getElementById('result');
    result.classList.remove('hidden');
    result.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">${msg}</div>`;
  }

  function showSuccess(msg) {
    const result = document.getElementById('result');
    result.classList.remove('hidden');
    result.innerHTML = `<div class="bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-700 flex items-center gap-2">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      ${esc(msg)}
    </div>`;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  if (!getKey()) showErr('No API key set. <a href="/ui/index.html" class="underline font-medium">Set it on the dashboard</a> first.');
</script>
</body>
</html>
