<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Keys — FillMyPDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui,-apple-system,sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
    <a href="/ui/index.html" class="text-gray-400 hover:text-indigo-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="font-semibold text-gray-800">API Keys</span>
    <button onclick="showCreateModal()" class="ml-auto flex items-center gap-1.5 bg-indigo-600 text-white rounded-lg px-4 py-1.5 text-sm font-medium hover:bg-indigo-700">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Key
    </button>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <p class="text-sm text-gray-500 mb-6">Keys are required for every API call via the <code class="bg-gray-100 px-1 rounded text-xs">X-API-Key</code> header.</p>
    <div id="key-list" class="space-y-3"></div>
    <div id="empty-state" class="hidden text-center py-16 text-gray-400">
      <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
      <p class="font-medium">No API keys</p>
      <p class="text-sm mt-1">Create your first key to get started.</p>
    </div>
  </main>

  <!-- Create modal -->
  <div id="create-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6">
      <h2 class="text-base font-bold text-gray-900 mb-4">Create API Key</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Key Name <span class="text-red-500">*</span></label>
          <input id="new-name" type="text" placeholder="My integration" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Tier</label>
          <select id="new-tier" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="free">Free (60 req/min)</option>
            <option value="pro" selected>Pro (600 req/min)</option>
            <option value="business">Business (6000 req/min)</option>
            <option value="admin">Admin (unlimited)</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Owner / Label</label>
          <input id="new-owner" type="text" placeholder="user@example.com" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
      </div>
      <div class="mt-5 flex gap-2">
        <button onclick="createKey()" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-indigo-700">Create</button>
        <button onclick="closeCreateModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm font-medium hover:bg-gray-200">Cancel</button>
      </div>
    </div>
  </div>

  <!-- New-key reveal modal (shown once after creation) -->
  <div id="reveal-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <div>
          <h2 class="text-base font-bold text-gray-900">Key created</h2>
          <p class="text-xs text-gray-500">Copy it now — it won't be shown again.</p>
        </div>
      </div>
      <div class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 flex items-center gap-2 mb-4">
        <code id="reveal-key" class="text-xs font-mono text-gray-800 flex-1 break-all"></code>
        <button onclick="copyRevealKey()" class="text-gray-400 hover:text-indigo-600 flex-shrink-0" title="Copy">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        </button>
      </div>
      <button onclick="useThisKey()" class="w-full mb-2 bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-indigo-700">Use this key in UI</button>
      <button onclick="closeRevealModal()" class="w-full bg-gray-100 text-gray-700 rounded-lg py-2 text-sm font-medium hover:bg-gray-200">Done</button>
    </div>
  </div>

<script>
  function getKey() { return localStorage.getItem('fmp_api_key') || ''; }

  const TIER_STYLE = {
    admin:    'bg-purple-100 text-purple-700',
    business: 'bg-blue-100 text-blue-700',
    pro:      'bg-indigo-100 text-indigo-700',
    free:     'bg-gray-100 text-gray-600',
  };

  async function loadKeys() {
    const key = getKey();
    const list = document.getElementById('key-list');
    const empty = document.getElementById('empty-state');
    if (!key) {
      list.innerHTML = '<p class="text-red-500 text-sm text-center py-8">No API key set. <a href="/ui/index.html" class="underline">Set it on the dashboard.</a></p>';
      return;
    }
    try {
      const r = await fetch('/api/v1/keys/', { headers: {'X-API-Key': key} });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const keys = await r.json();
      if (!keys.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      list.innerHTML = keys.map(k => {
        const isRevoked = k.revoked;
        return `
          <div class="bg-white rounded-xl border ${isRevoked ? 'border-gray-100 opacity-60' : 'border-gray-200'} shadow-sm p-4">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <span class="font-medium text-gray-900 text-sm">${esc(k.name)}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full font-medium ${TIER_STYLE[k.tier]||'bg-gray-100 text-gray-500'}">${k.tier}</span>
                  ${isRevoked ? '<span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-600 font-medium">revoked</span>' : ''}
                </div>
                <p class="text-xs text-gray-400 font-mono">${esc(k.id)}</p>
                ${k.owner ? `<p class="text-xs text-gray-400 mt-0.5">${esc(k.owner)}</p>` : ''}
              </div>
              <div class="text-right text-xs text-gray-400 flex-shrink-0">
                <p>${k.request_count?.toLocaleString() ?? 0} requests</p>
                <p class="mt-0.5">${k.last_used_at ? 'Last used ' + fmtDate(k.last_used_at) : 'Never used'}</p>
              </div>
            </div>
            ${!isRevoked ? `
            <div class="mt-3 flex gap-2">
              <button onclick="revokeKey('${esc(k.id)}','${esc(k.name)}')" class="text-xs text-red-500 hover:text-red-700 border border-red-200 rounded-lg px-3 py-1 hover:bg-red-50 transition">Revoke</button>
              <button onclick="deleteKey('${esc(k.id)}','${esc(k.name)}')" class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg px-3 py-1 hover:bg-gray-50 transition">Delete</button>
            </div>` : `
            <div class="mt-3">
              <button onclick="deleteKey('${esc(k.id)}','${esc(k.name)}')" class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg px-3 py-1 hover:bg-gray-50 transition">Delete</button>
            </div>`}
          </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = `<p class="text-red-500 text-sm text-center py-8">${esc(e.message)}</p>`;
    }
  }

  function showCreateModal() {
    document.getElementById('new-name').value = '';
    document.getElementById('new-tier').value = 'pro';
    document.getElementById('new-owner').value = '';
    document.getElementById('create-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('new-name').focus(), 50);
  }
  function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }

  async function createKey() {
    const apiKey = getKey();
    if (!apiKey) return;
    const name  = document.getElementById('new-name').value.trim();
    const tier  = document.getElementById('new-tier').value;
    const owner = document.getElementById('new-owner').value.trim();
    if (!name) { alert('Name is required.'); return; }
    try {
      const r = await fetch('/api/v1/keys/', {
        method: 'POST',
        headers: {'X-API-Key': apiKey, 'Content-Type': 'application/json'},
        body: JSON.stringify({ name, tier, owner: owner || undefined })
      });
      if (!r.ok) { const d = await r.json(); alert('Error: ' + (d.detail || r.status)); return; }
      const data = await r.json();
      closeCreateModal();
      document.getElementById('reveal-key').textContent = data.key;
      document.getElementById('reveal-modal').classList.remove('hidden');
      loadKeys();
    } catch(e) { alert('Error: ' + e.message); }
  }

  function copyRevealKey() {
    const val = document.getElementById('reveal-key').textContent;
    navigator.clipboard.writeText(val).then(() => alert('Copied!'));
  }

  function useThisKey() {
    const val = document.getElementById('reveal-key').textContent;
    localStorage.setItem('fmp_api_key', val);
    closeRevealModal();
    alert('Key saved to browser. All UI pages will now use this key.');
  }

  function closeRevealModal() { document.getElementById('reveal-modal').classList.add('hidden'); }

  async function revokeKey(id, name) {
    if (!confirm(`Revoke key "${name}"? It will stop working immediately.`)) return;
    const apiKey = getKey();
    const r = await fetch(`/api/v1/keys/${id}/revoke`, { method:'POST', headers:{'X-API-Key': apiKey} });
    if (r.ok) { loadKeys(); } else { alert('Failed: ' + r.status); }
  }

  async function deleteKey(id, name) {
    if (!confirm(`Permanently delete key "${name}"?`)) return;
    const apiKey = getKey();
    const r = await fetch(`/api/v1/keys/${id}`, { method:'DELETE', headers:{'X-API-Key': apiKey} });
    if (r.ok || r.status === 204) { loadKeys(); } else { alert('Failed: ' + r.status); }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(s) { try { return new Date(s).toLocaleString(); } catch { return s||'—'; } }

  loadKeys();
</script>
</body>
</html>
