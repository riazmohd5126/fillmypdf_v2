<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profiles — FillMyPDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui,-apple-system,sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
    <a href="/ui/index.html" class="text-gray-400 hover:text-indigo-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="font-semibold text-gray-800">Profiles</span>
    <button onclick="openCreateModal()" class="ml-auto bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-indigo-700">
      + New Profile
    </button>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Search / filter bar -->
    <div class="flex gap-3 mb-6">
      <input id="search-input" type="text" placeholder="Search profiles…" oninput="filterProfiles()"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <select id="type-filter" onchange="filterProfiles()"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">All types</option>
        <option value="personal">Personal</option>
        <option value="business">Business</option>
        <option value="spouse">Spouse</option>
        <option value="dependent">Dependent</option>
        <option value="custom">Custom</option>
      </select>
    </div>

    <!-- Profile list -->
    <div id="profile-list" class="space-y-3"></div>
    <div id="empty-state" class="hidden text-center py-16 text-gray-400">
      <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <p class="font-medium">No profiles yet</p>
      <p class="text-sm mt-1">Create your first profile to get started.</p>
    </div>
  </main>

  <!-- Create / Edit Modal -->
  <div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden overflow-y-auto py-8">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b border-gray-100 flex items-center justify-between">
        <h2 id="modal-title" class="text-lg font-bold text-gray-900">New Profile</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input id="hidden-id" type="hidden" />
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Profile Name *</label>
          <input id="f-name" type="text" placeholder="e.g. My Company, John Doe" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Profile Type</label>
          <select id="f-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="personal">Personal</option>
            <option value="business">Business</option>
            <option value="spouse">Spouse</option>
            <option value="dependent">Dependent</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Data (JSON) *</label>
          <p class="text-xs text-gray-400 mb-1">Sensitive fields (SSN, EIN, account numbers) are encrypted automatically.</p>
          <textarea id="f-data" rows="7" placeholder='{"first_name": "John", "last_name": "Doe", "email": "john@example.com"}'
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        </div>
        <div id="modal-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
      </div>
      <div class="p-6 pt-0 flex gap-3">
        <button onclick="saveProfile()" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-indigo-700">
          Save Profile
        </button>
        <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm font-medium hover:bg-gray-200">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div id="view-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden overflow-y-auto py-8">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b border-gray-100 flex items-center justify-between">
        <h2 id="view-title" class="text-lg font-bold text-gray-900">Profile Details</h2>
        <button onclick="closeViewModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6">
        <div id="view-meta" class="flex gap-4 mb-4 text-sm text-gray-500"></div>
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Data Preview</h3>
        <div id="view-data" class="bg-gray-50 rounded-xl p-4 font-mono text-xs text-gray-700 whitespace-pre-wrap"></div>
        <p class="text-xs text-amber-600 mt-2 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          Sensitive fields (SSN, EIN, etc.) are encrypted and not shown.
        </p>
      </div>
      <div class="p-6 pt-0 flex gap-3">
        <button id="view-edit-btn" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-indigo-700">Edit</button>
        <button onclick="closeViewModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm font-medium hover:bg-gray-200">Close</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete -->
  <div id="confirm-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-2">Delete Profile?</h2>
      <p class="text-sm text-gray-500 mb-5">This action cannot be undone.</p>
      <div class="flex gap-3">
        <button id="confirm-delete-btn" class="flex-1 bg-red-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-red-700">Delete</button>
        <button onclick="closeConfirmModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm font-medium hover:bg-gray-200">Cancel</button>
      </div>
    </div>
  </div>

<script>
  function getKey() { return localStorage.getItem('fmp_api_key') || ''; }
  let allProfiles = [];
  let pendingDeleteId = null;

  const BADGE = {
    personal: 'bg-blue-100 text-blue-700',
    business: 'bg-green-100 text-green-700',
    spouse: 'bg-purple-100 text-purple-700',
    dependent: 'bg-yellow-100 text-yellow-700',
    custom: 'bg-gray-100 text-gray-600',
  };

  // ── Load profiles ─────────────────────────────────────────────
  async function loadProfiles() {
    const key = getKey();
    if (!key) { showErr('No API key. <a href="/ui/index.html" class="underline">Set it on the dashboard</a>.'); return; }
    try {
      const r = await fetch('/api/v1/profiles', { headers: { 'X-API-Key': key } });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      allProfiles = await r.json();
      renderProfiles(allProfiles);
    } catch (e) { showErr(e.message); }
  }

  function renderProfiles(list) {
    const container = document.getElementById('profile-list');
    const empty = document.getElementById('empty-state');
    if (!list.length) { container.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    container.innerHTML = list.map(p => `
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm flex-shrink-0">
          ${p.name.charAt(0).toUpperCase()}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium text-gray-900 truncate">${esc(p.name)}</span>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${BADGE[p.profile_type] || BADGE.custom}">${esc(p.profile_type)}</span>
          </div>
          <p class="text-xs text-gray-400 mt-0.5">Used ${p.usage_count || 0} times · Created ${fmtDate(p.created_at)}</p>
        </div>
        <div class="flex gap-1">
          <button onclick="viewProfile('${p.id}')" title="View" class="p-2 text-gray-400 hover:text-indigo-600 rounded-lg hover:bg-indigo-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
          <button onclick="editProfile('${p.id}')" title="Edit" class="p-2 text-gray-400 hover:text-indigo-600 rounded-lg hover:bg-indigo-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button onclick="confirmDelete('${p.id}')" title="Delete" class="p-2 text-gray-400 hover:text-red-500 rounded-lg hover:bg-red-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function filterProfiles() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const t = document.getElementById('type-filter').value;
    renderProfiles(allProfiles.filter(p =>
      (!q || p.name.toLowerCase().includes(q)) &&
      (!t || p.profile_type === t)
    ));
  }

  // ── Create / Edit modal ───────────────────────────────────────
  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'New Profile';
    document.getElementById('hidden-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-type').value = 'personal';
    document.getElementById('f-data').value = '';
    hideModalErr();
    document.getElementById('modal').classList.remove('hidden');
  }

  function editProfile(id) {
    const p = allProfiles.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Edit Profile';
    document.getElementById('hidden-id').value = p.id;
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-type').value = p.profile_type;
    document.getElementById('f-data').value = JSON.stringify(p.data_preview || {}, null, 2);
    hideModalErr();
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('view-modal').classList.add('hidden');
  }

  function closeModal() { document.getElementById('modal').classList.add('hidden'); }

  async function saveProfile() {
    const key = getKey();
    if (!key) { showModalErr('No API key set.'); return; }
    const name = document.getElementById('f-name').value.trim();
    const type = document.getElementById('f-type').value;
    const rawData = document.getElementById('f-data').value.trim();
    if (!name) { showModalErr('Profile name is required.'); return; }
    let data = {};
    if (rawData) {
      try { data = JSON.parse(rawData); } catch { showModalErr('Invalid JSON in data field.'); return; }
    }
    const id = document.getElementById('hidden-id').value;
    const url = id ? `/api/v1/profiles/${id}` : '/api/v1/profiles';
    const method = id ? 'PATCH' : 'POST';
    try {
      const r = await fetch(url, {
        method, headers: { 'X-API-Key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, profile_type: type, data }),
      });
      if (!r.ok) { const e = await r.json().catch(() => {}); throw new Error(e?.detail || `HTTP ${r.status}`); }
      closeModal(); loadProfiles();
    } catch (e) { showModalErr(e.message); }
  }

  // ── View modal ────────────────────────────────────────────────
  function viewProfile(id) {
    const p = allProfiles.find(x => x.id === id);
    if (!p) return;
    document.getElementById('view-title').textContent = p.name;
    document.getElementById('view-meta').innerHTML =
      `<span>${esc(p.profile_type)}</span><span>·</span><span>Used ${p.usage_count || 0}×</span><span>·</span><span>Created ${fmtDate(p.created_at)}</span>`;
    document.getElementById('view-data').textContent = JSON.stringify(p.data_preview || {}, null, 2);
    document.getElementById('view-edit-btn').onclick = () => editProfile(id);
    document.getElementById('view-modal').classList.remove('hidden');
  }
  function closeViewModal() { document.getElementById('view-modal').classList.add('hidden'); }

  // ── Delete ────────────────────────────────────────────────────
  function confirmDelete(id) {
    pendingDeleteId = id;
    document.getElementById('confirm-modal').classList.remove('hidden');
  }
  function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); pendingDeleteId = null; }
  document.getElementById('confirm-delete-btn').onclick = async () => {
    if (!pendingDeleteId) return;
    const key = getKey();
    await fetch(`/api/v1/profiles/${pendingDeleteId}`, { method: 'DELETE', headers: { 'X-API-Key': key } });
    closeConfirmModal(); loadProfiles();
  };

  // ── Helpers ───────────────────────────────────────────────────
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(s) { try { return new Date(s).toLocaleDateString(); } catch { return s || ''; } }
  function showErr(msg) { document.getElementById('profile-list').innerHTML = `<p class="text-red-500 text-sm text-center py-8">${msg}</p>`; }
  function showModalErr(msg) { const el = document.getElementById('modal-error'); el.textContent = msg; el.classList.remove('hidden'); }
  function hideModalErr() { document.getElementById('modal-error').classList.add('hidden'); }

  loadProfiles();
</script>
</body>
</html>
