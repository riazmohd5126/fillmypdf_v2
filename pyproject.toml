[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "slow: tests that take >5s (skip in fast runs)",
    "live_ai: tests that hit the real Gemini API (require GEMINI_API_KEY)",
    "integration: tests that touch the filesystem or run end-to-end pipelines",
]

[tool.coverage.run]
source = ["fillmypdf"]
omit = [
    "fillmypdf/main.py",  # exercised via API tests
    "*/tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
